services:
  - type: web
    name: safepath-ai
    env: python
    pythonVersion: 3.12
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    autoDeploy: true
    repo: https://github.com/ReenasriKK/safepath_ai
    envVars:
      - key: FLASK_ENV
        value: production
